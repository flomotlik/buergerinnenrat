# Issue-System — Konfiguration (Schema: vorlagen-Stil, 2026-05)
# Single-Repo auf GitHub. Workspace IST ein git repo (auf flomotlik/buergerinnenrat).

# ---- Per-Stage Agent-Modelle ---------------------------------------------
research_model: opus
plan_model: opus
execute_model: sonnet

# ---- Issue-Quelle --------------------------------------------------------
# Neue Issues werden auch auf GitHub Issues angelegt; ISSUE.md-Frontmatter
# bekommt source/source_id/source_url zurueckgeschrieben.
source:
  type: github
  repo: flomotlik/buergerinnenrat
  sync_on_create: true

github:
  repo: flomotlik/buergerinnenrat

# ---- Branch-Naming -------------------------------------------------------
# Bestandskonvention: nur Slug, ohne `issue/`-Praefix (z. B. `01-upstream-...`,
# `08-engine-a-...`). Migrations-Slugs der DS-Welle nutzten `issue/<slug>`-
# Konvention, beide funktionieren.
naming:
  branch: "{slug}"
  prefix: ""
  separator: "-"

# ---- Commit-Format -------------------------------------------------------
commits:
  format: conventional
  prefix: false

# ---- Workflow-Flags ------------------------------------------------------
commit_artifacts: true

worktrees: true
worktree_dir: ".worktrees"

staleness_days: 7

# ---- Repos ---------------------------------------------------------------
# Single-Repo: Workspace-Wurzel ist das Repo selbst.
repos:
  - name: personenwahl
    path: .
