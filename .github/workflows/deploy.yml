name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app (eslint + prettier)
        run: pnpm --filter @sortition/web lint

      - name: Typecheck workspace
        run: pnpm -r --filter './packages/**' --filter '@sortition/web' exec tsc --noEmit

      - name: Run unit tests (packages)
        run: pnpm -r --filter './packages/**' test

      - name: Run unit tests (web)
        run: pnpm --filter @sortition/web test

      - name: Build web bundle
        run: pnpm --filter @sortition/web build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @sortition/web exec playwright install --with-deps chromium

      - name: Wait for live URL to propagate
        env:
          LIVE_BASE_URL: https://flomotlik.github.io/buergerinnenrat/
        # actions/deploy-pages reports success the moment the artifact is
        # published, but the GH Pages CDN can take 1-3 minutes to start
        # serving the new artifact (especially on first-time activation).
        # Poll until HTTP 200 with a 5-minute ceiling to avoid masking real
        # outages.
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$LIVE_BASE_URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Live URL is up."
              exit 0
            fi
            sleep 10
          done
          echo "Live URL did not return 200 within 5 minutes."
          exit 1

      - name: Run live smoke tests
        env:
          LIVE_BASE_URL: https://flomotlik.github.io/buergerinnenrat/
        run: pnpm --filter @sortition/web exec playwright test --config=playwright-live.config.ts

      - name: Upload smoke traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces
          path: apps/web/test-results/
          if-no-files-found: ignore
