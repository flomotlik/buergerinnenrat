name: Deploy

# Triggers:
# - pull_request: build + e2e (no deploy/smoke)
# - push to main: build + e2e → deploy → live-smoke
# - workflow_dispatch: manual re-run.
#
# Job graph: build → e2e → deploy → smoke
# e2e covers preview-server contract surface (apps/web/tests/e2e, ~44 tests
# × 2 browsers); live-smoke covers production-deploy surface (CDN headers,
# GitHub-Pages path, woff2 delivery).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Limit Pages concurrency to push events only — multiple PRs running build in
# parallel must NOT contend for the pages group, since they don't deploy.
concurrency:
  group: ${{ github.event_name == 'push' && 'pages' || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app (eslint + prettier)
        run: pnpm --filter @sortition/web lint

      - name: Typecheck workspace
        run: pnpm -r --filter './packages/**' --filter '@sortition/web' exec tsc --noEmit

      - name: Run unit tests (packages)
        run: pnpm -r --filter './packages/**' test

      - name: Run unit tests (web)
        run: pnpm --filter @sortition/web test

      - name: Build web bundle
        run: pnpm --filter @sortition/web build

      # Pages artifact + deploy only run for push-to-main. PRs build but
      # don't deploy.
      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  e2e:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (with deps)
        # --with-deps installs system libs; harmless if already cached.
        # We install the matrix browser only — the other one waits its turn.
        run: pnpm --filter @sortition/web exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build web bundle
        # Required for vite preview to serve dist/. Build is fast (~5s warm).
        # We don't reuse the build job's pages artifact because that artifact
        # is gated on push events; running our own build keeps PR/push paths
        # symmetric.
        run: pnpm --filter @sortition/web build

      - name: Run Playwright e2e (${{ matrix.browser }})
        run: pnpm --filter @sortition/web exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.browser }}-traces-${{ github.run_attempt }}
          path: apps/web/test-results/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.browser }}-report-${{ github.run_attempt }}
          path: apps/web/playwright-report/
          if-no-files-found: ignore

  deploy:
    if: github.event_name == 'push'
    needs: [build, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @sortition/web exec playwright install --with-deps chromium

      - name: Wait for live URL to propagate
        env:
          LIVE_BASE_URL: https://flomotlik.github.io/buergerinnenrat/
        # actions/deploy-pages reports success the moment the artifact is
        # published, but the GH Pages CDN can take 1-3 minutes to start
        # serving the new artifact (especially on first-time activation).
        # Poll until HTTP 200 with a 5-minute ceiling to avoid masking real
        # outages.
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$LIVE_BASE_URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Live URL is up."
              exit 0
            fi
            sleep 10
          done
          echo "Live URL did not return 200 within 5 minutes."
          exit 1

      - name: Run live smoke tests
        env:
          LIVE_BASE_URL: https://flomotlik.github.io/buergerinnenrat/
        run: pnpm --filter @sortition/web exec playwright test --config=playwright-live.config.ts

      - name: Upload smoke traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces
          path: apps/web/test-results/
          if-no-files-found: ignore
