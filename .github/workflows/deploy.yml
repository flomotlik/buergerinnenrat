name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm -r --filter './packages/**' --filter '@sortition/web' exec tsc --noEmit

      - name: Run unit tests (packages)
        run: pnpm -r --filter './packages/**' test

      - name: Build web bundle
        run: pnpm --filter @sortition/web build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run when the repo has not had it
          # configured yet (avoids manual Settings click). Idempotent on
          # subsequent runs.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @sortition/web exec playwright install --with-deps chromium

      - name: Run live smoke tests
        env:
          LIVE_BASE_URL: https://flomotlik.github.io/buergerinnenrat/
        run: pnpm --filter @sortition/web exec playwright test --config=playwright-live.config.ts

      - name: Upload smoke traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces
          path: apps/web/test-results/
          if-no-files-found: ignore
