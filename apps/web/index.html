<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Personenauswahl — stratifizierte Zufallsauswahl</title>
    <!-- Grüne-AT Design System (v2.0, see issue #12). Loaded from CDN — never
         vendored. Carries the brand tokens (`--gat-color-*`, `--gat-web-*`),
         the typography stack (Barlow Semi Condensed et al.), the
         `.gat-skiplink` utility, and the brand assets we link in markup.
         Pinned to the project page via the canonical URL; CDN refresh
         delivers v2.1+ automatically once design-system#13 ships. -->
    <link
      rel="stylesheet"
      href="https://grueneat.github.io/design-system/design-system.css"
    />
    <!-- Typography is loaded via the design-system CSS above (Barlow Semi
         Condensed + Vollkorn from Google Fonts). Self-hosted woff2 assets
         are gone (Phase 2 of #12); the brand stack is fully CDN-driven. -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <!-- Favicon: Grüne-AT wordmark from the design-system CDN. Same source
         as the Brand block in `src/shell/Brand.tsx` — single brand-asset
         origin, no vendoring. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://grueneat.github.io/design-system/assets/gruene-logo.svg"
    />
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
